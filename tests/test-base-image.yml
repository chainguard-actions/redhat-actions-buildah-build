name: Test build from base image
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RUNNER_OS: Linux
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create mock buildah binary
        run: |
          mkdir -p /usr/local/bin
          cat > /usr/local/bin/buildah << 'BUILDAH_MOCK'
          #!/bin/bash
          # Mock buildah that succeeds for all commands
          echo "buildah mock: $@" >&2
          if [ "$1" = "version" ]; then
            echo "buildah version 1.29.0 (image-spec 1.0.2-dev, runtime-spec 1.0.2-dev)"
          elif [ "$1" = "from" ]; then
            # Output a container name as buildah from would
            echo "alpine-working-container"
          fi
          exit 0
          BUILDAH_MOCK
          chmod +x /usr/local/bin/buildah

      - name: Create mock storage config
        run: |
          mkdir -p /etc/containers
          printf '[storage]\ndriver = "vfs"\n' > /etc/containers/storage.conf

      - id: build
        uses: .
        with:
          image: base-image-test
          tags: v1.0
          base-image: alpine:3.18
          entrypoint: /bin/sh
          port: '8080'
          workdir: /app

      - name: Assert image output
        env:
          ACTUAL: ${{ steps.build.outputs.image }}
        run: |
          echo "actual image: $ACTUAL"
          if [ "$ACTUAL" != "base-image-test" ]; then
            echo "FAIL: expected image output to be 'base-image-test', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"

      - name: Assert tags output
        env:
          ACTUAL: ${{ steps.build.outputs.tags }}
        run: |
          echo "actual tags: $ACTUAL"
          if [ "$ACTUAL" != "v1.0" ]; then
            echo "FAIL: expected tags output to be 'v1.0', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"

      - name: Assert image-with-tag output
        env:
          ACTUAL: ${{ steps.build.outputs.image-with-tag }}
        run: |
          echo "actual image-with-tag: $ACTUAL"
          if [ "$ACTUAL" != "base-image-test:v1.0" ]; then
            echo "FAIL: expected image-with-tag output to be 'base-image-test:v1.0', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
