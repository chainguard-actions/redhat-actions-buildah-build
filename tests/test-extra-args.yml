name: Test extra-args input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RUNNER_OS: Linux
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create mock buildah binary
        run: |
          mkdir -p /usr/local/bin
          cat > /usr/local/bin/buildah << 'BUILDAH_MOCK'
          #!/bin/bash
          # Mock buildah that succeeds for all commands
          echo "buildah mock: $@" >&2
          if [ "$1" = "version" ]; then
            echo "buildah version 1.29.0 (image-spec 1.0.2-dev, runtime-spec 1.0.2-dev)"
          fi
          exit 0
          BUILDAH_MOCK
          chmod +x /usr/local/bin/buildah

      - name: Create mock storage config
        run: |
          mkdir -p /etc/containers
          printf '[storage]\ndriver = "vfs"\n' > /etc/containers/storage.conf

      - name: Create Containerfile
        run: |
          cat > /tmp/Containerfile-extra << 'EOF'
          FROM alpine:3.18
          RUN echo "extra-args test"
          EOF

      - id: build
        uses: .
        with:
          image: extra-args-test-image
          tags: latest
          containerfiles: /tmp/Containerfile-extra
          extra-args: |
            --squash-all
            --no-cache

      - name: Assert image output
        env:
          ACTUAL: ${{ steps.build.outputs.image }}
        run: |
          echo "actual image: $ACTUAL"
          if [ "$ACTUAL" != "extra-args-test-image" ]; then
            echo "FAIL: expected image output to be 'extra-args-test-image', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"

      - name: Assert tags output
        env:
          ACTUAL: ${{ steps.build.outputs.tags }}
        run: |
          echo "actual tags: $ACTUAL"
          if [ "$ACTUAL" != "latest" ]; then
            echo "FAIL: expected tags output to be 'latest', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
