name: Test build with build-args and labels
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RUNNER_OS: Linux
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create mock buildah binary
        run: |
          mkdir -p /usr/local/bin
          cat > /usr/local/bin/buildah << 'BUILDAH_MOCK'
          #!/bin/bash
          # Mock buildah that succeeds for all commands
          echo "buildah mock: $@" >&2
          if [ "$1" = "version" ]; then
            echo "buildah version 1.29.0 (image-spec 1.0.2-dev, runtime-spec 1.0.2-dev)"
          fi
          exit 0
          BUILDAH_MOCK
          chmod +x /usr/local/bin/buildah

      - name: Create mock storage config
        run: |
          mkdir -p /etc/containers
          printf '[storage]\ndriver = "vfs"\n' > /etc/containers/storage.conf

      - name: Create Containerfile with ARG
        run: |
          cat > /tmp/Containerfile.args << 'EOF'
          FROM alpine:3.18
          ARG APP_VERSION=unknown
          ARG BUILD_DATE=unknown
          LABEL app.version=$APP_VERSION
          LABEL build.date=$BUILD_DATE
          RUN echo "Version: $APP_VERSION"
          EOF

      - id: build
        uses: .
        with:
          image: args-test-image
          tags: latest
          containerfiles: /tmp/Containerfile.args
          context: .
          build-args: |
            APP_VERSION=1.2.3
            BUILD_DATE=2024-01-01
          labels: |
            org.opencontainers.image.title=Test Image
            org.opencontainers.image.version=1.2.3

      - name: Assert image output
        env:
          ACTUAL: ${{ steps.build.outputs.image }}
        run: |
          echo "actual image: $ACTUAL"
          if [ "$ACTUAL" != "args-test-image" ]; then
            echo "FAIL: expected image output to be 'args-test-image', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"

      - name: Assert image-with-tag output
        env:
          ACTUAL: ${{ steps.build.outputs.image-with-tag }}
        run: |
          echo "actual image-with-tag: $ACTUAL"
          if [ "$ACTUAL" != "args-test-image:latest" ]; then
            echo "FAIL: expected image-with-tag to be 'args-test-image:latest', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
