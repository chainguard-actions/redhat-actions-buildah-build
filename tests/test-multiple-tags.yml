name: Test build with multiple tags
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RUNNER_OS: Linux
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create mock buildah binary
        run: |
          mkdir -p /usr/local/bin
          cat > /usr/local/bin/buildah << 'BUILDAH_MOCK'
          #!/bin/bash
          # Mock buildah that succeeds for all commands
          echo "buildah mock: $@" >&2
          if [ "$1" = "version" ]; then
            echo "buildah version 1.29.0 (image-spec 1.0.2-dev, runtime-spec 1.0.2-dev)"
          fi
          exit 0
          BUILDAH_MOCK
          chmod +x /usr/local/bin/buildah

      - name: Create mock storage config
        run: |
          mkdir -p /etc/containers
          printf '[storage]\ndriver = "vfs"\n' > /etc/containers/storage.conf

      - name: Create Containerfile
        run: |
          cat > /tmp/Containerfile.multi << 'EOF'
          FROM alpine:3.18
          LABEL maintainer="test"
          EOF

      - id: build
        uses: .
        with:
          image: multi-tag-image
          tags: latest v1 v1.0
          containerfiles: /tmp/Containerfile.multi
          context: .

      - name: Assert image output
        env:
          ACTUAL: ${{ steps.build.outputs.image }}
        run: |
          echo "actual image: $ACTUAL"
          if [ "$ACTUAL" != "multi-tag-image" ]; then
            echo "FAIL: expected image output to be 'multi-tag-image', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"

      - name: Assert tags output contains all tags
        env:
          ACTUAL: ${{ steps.build.outputs.tags }}
        run: |
          echo "actual tags: $ACTUAL"
          if [ "$ACTUAL" != "latest v1 v1.0" ]; then
            echo "FAIL: expected tags output to be 'latest v1 v1.0', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"

      - name: Assert image-with-tag uses first tag
        env:
          ACTUAL: ${{ steps.build.outputs.image-with-tag }}
        run: |
          echo "actual image-with-tag: $ACTUAL"
          if [ "$ACTUAL" != "multi-tag-image:latest" ]; then
            echo "FAIL: expected image-with-tag to be 'multi-tag-image:latest', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
